<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="350" viewBox="0 0 1120 350" role="img" aria-labelledby="title desc">
  <title id="title">Saro / saroo98 profile hero</title>
  <desc id="desc">Defensive research, local tooling, and publishing systems.</desc>
  <defs>
    <radialGradient id="hero-bg" cx="48%" cy="20%" r="88%">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="48%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="hero-route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/>
      <stop offset="42%" stop-color="#7dd3fc" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#f97316" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#a3e635" stop-opacity="0"/>
    </linearGradient>
    <pattern id="hero-grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#7dd3fc" stroke-opacity=".06" stroke-width="1" fill="none"/>
      <circle cx="2" cy="2" r="1" fill="#c4b5fd" opacity=".16"/>
    </pattern>
    <filter id="hero-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .sans{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace}
      .dash{stroke-dasharray:14 18;animation:dash 16s linear infinite}
      .scan{animation:scan 6s ease-in-out infinite}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      @keyframes dash{to{stroke-dashoffset:-520}}
      @keyframes scan{0%,100%{transform:translateX(-360px);opacity:.07}50%{transform:translateX(520px);opacity:.22}}
      @keyframes pulse{0%,100%{opacity:.42}50%{opacity:1}}
    </style>
  </defs>
  <rect width="1120" height="350" rx="30" fill="url(#hero-bg)"/>
  <rect width="1120" height="350" rx="30" fill="url(#hero-grid)"/>
  <rect x="1.2" y="1.2" width="1117.6" height="347.6" rx="28.8" fill="none" stroke="#7dd3fc" stroke-opacity=".24" stroke-width="1.4"/>
  <path d="M52 56V32H172" stroke="#7dd3fc" stroke-opacity=".35" stroke-width="1.2" fill="none"/>
  <path d="M1068 294v24H948" stroke="#c4b5fd" stroke-opacity=".35" stroke-width="1.2" fill="none"/>
  <rect class="scan" x="0" y="0" width="280" height="350" fill="url(#hero-route)" opacity=".18"/>
  <path class="dash" filter="url(#hero-glow)" d="M58 280C204 214 312 320 462 244S726 178 876 252S1040 294 1064 232" stroke="url(#hero-route)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="72" y="76" class="mono" fill="#7dd3fc" font-size="15" letter-spacing="2.6">~/profile</text>
  <text x="72" y="126" class="sans" fill="#f8fafc" font-size="44" font-weight="850" letter-spacing="-.8">Saro / saroo98</text>
  <text x="72" y="154" class="mono" fill="#94a3b8" font-size="17">defensive research · local tooling · publishing systems</text>
  <text x="72" y="188" class="mono" fill="#d8e1ea" font-size="18">Building practical software for real constraints.</text>
  <text x="72" y="218" class="mono" fill="#d8e1ea" font-size="18">Automating the complex. Engineering clean systems.</text>
  <text x="72" y="248" class="mono" fill="#d8e1ea" font-size="18">Public-interest technical work, writing workflows, and maintainable repositories.</text>
  <g class="pulse" transform="translate(925 76)">
    <rect width="112" height="112" rx="30" fill="#020617" stroke="#7dd3fc" stroke-opacity=".45"/>
    <circle cx="56" cy="56" r="38" fill="none" stroke="#a3e635" stroke-opacity=".34"/>
    <path d="M28 58h20l8-25 18 60 12-35h22" stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(820 228)" opacity=".95">
    <circle cx="0" cy="0" r="4" fill="#f97316"/>
    <circle cx="72" cy="-34" r="4" fill="#a3e635"/>
    <circle cx="144" cy="10" r="4" fill="#7dd3fc"/>
    <path d="M0 0H38C58 0 52-34 72-34H108C128-34 122 10 144 10" stroke="#c4b5fd" stroke-opacity=".55" stroke-width="1.5" fill="none"/>
  </g>
</svg>
