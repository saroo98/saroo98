<svg xmlns="http://www.w3.org/2000/svg" width="540" height="250" viewBox="0 0 540 250" role="img" aria-labelledby="title desc">
  <title id="title">Sertraline</title>
  <desc id="desc">Personal publishing space for keeping writing and technical work visible.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#c4b5fd" stop-opacity="0"/><stop offset="48%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#c4b5fd" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" stroke="#c4b5fd" stroke-opacity=".045" fill="none"/></pattern>
    <style>.sans{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.dash{stroke-dasharray:10 14;animation:dash 12s linear infinite}.dot{animation:dot 2.8s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-380}}@keyframes dot{0%,100%{opacity:.35}50%{opacity:1}}</style>
  </defs>
  <rect width="540" height="250" rx="24" fill="url(#bg)"/>
  <rect width="540" height="250" rx="24" fill="url(#grid)"/>
  <rect x="1" y="1" width="538" height="248" rx="23" fill="none" stroke="#c4b5fd" stroke-opacity=".30"/>
  <text x="32" y="48" class="mono" fill="#c4b5fd" font-size="13" letter-spacing="2.2">PUBLISHING</text>
  <text x="32" y="96" class="sans" fill="#f8fafc" font-size="28" font-weight="800">Sertraline</text>
  <text x="32" y="132" class="mono" fill="#cbd5e1" font-size="15">Personal publishing space for keeping</text>
  <text x="32" y="156" class="mono" fill="#cbd5e1" font-size="15">writing and technical work visible.</text>
  <path class="dash" d="M32 208H206C252 208 246 184 294 184H500" stroke="url(#route)" stroke-width="2.3" stroke-linecap="round" fill="none"/>
  <circle class="dot" cx="500" cy="184" r="5" fill="#c4b5fd"/>
  <path d="M454 52h42v38h-42zM454 90c12-8 30-8 42 0" fill="none" stroke="#c4b5fd" stroke-opacity=".65" stroke-width="2" stroke-linecap="round"/>
