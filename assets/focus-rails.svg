<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="320" viewBox="0 0 1400 320" role="img" aria-labelledby="title desc">
  <title id="title">Signal Console OS focus rails</title>
  <desc id="desc">Four clean horizontal rails for defensive engineering, local-first tooling, interface craft, and evidence loops.</desc>
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#2A383A" opacity="0.7"/>
    </pattern>
    <style>
      .bg{fill:#071012}
      .panel{fill:#0D171A;stroke:#2A383A;stroke-width:1.4}
      .text{font:750 22px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1px;fill:#E8E1D2}
      .small{font:650 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.5px;fill:#8D9894}
      .route{fill:none;stroke:#B9832F;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
      .olive{fill:#91A35F}
      .amber{fill:#B9832F}
    </style>
  </defs>
  <rect width="1400" height="320" rx="18" class="bg"/>
  <rect width="1400" height="320" rx="18" fill="url(#dots)" opacity="0.46"/>
  <rect x="26" y="26" width="1348" height="268" rx="14" fill="none" stroke="#2A383A"/>
  <text x="54" y="66" class="small">CURRENT FOCUS / HORIZONTAL RAILS</text>
  <g transform="translate(64 90)">
    <rect x="0" y="0" width="1272" height="42" rx="8" class="panel"/>
    <circle cx="28" cy="21" r="7" class="olive"/>
    <text x="60" y="28" class="text">Defensive engineering</text>
    <path d="M420 21h626l24-16h128" class="route"/>
    <circle cx="1070" cy="5" r="5" class="amber"/>
    <text x="1134" y="27" class="small">AUTH / INPUT / PATCH</text>
    <g transform="translate(0 58)">
      <rect x="0" y="0" width="1272" height="42" rx="8" class="panel"/>
      <circle cx="28" cy="21" r="7" class="olive"/>
      <text x="60" y="28" class="text">Local-first tooling</text>
      <path d="M392 21h516l28 16h262" class="route"/>
      <circle cx="936" cy="37" r="5" class="amber"/>
      <text x="1134" y="27" class="small">PRIVATE / USEFUL</text>
    </g>
    <g transform="translate(0 116)">
      <rect x="0" y="0" width="1272" height="42" rx="8" class="panel"/>
      <circle cx="28" cy="21" r="7" class="olive"/>
      <text x="60" y="28" class="text">Interface craft</text>
      <path d="M348 21h398l24-16h428" class="route"/>
      <circle cx="770" cy="5" r="5" class="amber"/>
      <text x="1134" y="27" class="small">README / PRODUCT</text>
    </g>
    <g transform="translate(0 174)">
      <rect x="0" y="0" width="1272" height="42" rx="8" class="panel"/>
      <circle cx="28" cy="21" r="7" class="olive"/>
      <text x="60" y="28" class="text">Evidence loops</text>
      <path d="M324 21h306l26 16h542" class="route"/>
      <circle cx="656" cy="37" r="5" class="amber"/>
      <text x="1134" y="27" class="small">TEST / DOC / LOG</text>
    </g>
  </g>
</svg>
