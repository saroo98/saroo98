<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Signal Console OS build map</title>
  <desc id="desc">A dark mechanism diagram where discover, model, implement, verify, document, and patch route through a central evidence validator.</desc>
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1.15" fill="#2A383A" opacity="0.8"/>
    </pattern>
    <style>
      .bg{fill:#071012}
      .panel{fill:#0D171A;stroke:#2A383A;stroke-width:1.4}
      .soft{fill:#101D20;stroke:#1A282B;stroke-width:1.2}
      .text{font:700 20px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.6px;fill:#E8E1D2}
      .small{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.1px;fill:#8D9894}
      .micro{font:600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.4px;fill:#8D9894}
      .route{fill:none;stroke:#B9832F;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
      .review{fill:none;stroke:#B9832F;stroke-width:1.4;stroke-dasharray:9 9;stroke-linecap:round;stroke-linejoin:round}
      .line{fill:none;stroke:#2A383A;stroke-width:1.3}
      .olive{fill:none;stroke:#91A35F;stroke-width:1.8}
      .node{fill:#91A35F}
      .amber{fill:#B9832F}
    </style>
  </defs>
  <rect width="1400" height="560" rx="20" class="bg"/>
  <rect width="1400" height="560" rx="20" fill="url(#dots)" opacity="0.55"/>
  <rect x="26" y="26" width="1348" height="508" rx="16" fill="none" stroke="#2A383A"/>
  <path d="M54 78H420M980 78h248l28 28h90" class="line"/>
  <text x="54" y="64" class="micro">BUILD MAP / SIGNAL CONSOLE OS</text>
  <rect x="86" y="210" width="190" height="82" rx="9" class="panel"/>
  <text x="114" y="252" class="text">DISCOVER</text>
  <text x="114" y="274" class="small">read first</text>
  <rect x="322" y="210" width="170" height="82" rx="9" class="soft"/>
  <text x="350" y="252" class="text">MODEL</text>
  <text x="350" y="274" class="small">boundaries</text>
  <rect x="548" y="210" width="210" height="82" rx="9" class="panel"/>
  <text x="576" y="252" class="text">IMPLEMENT</text>
  <text x="576" y="274" class="small">small change</text>
  <rect x="814" y="210" width="170" height="82" rx="9" class="soft"/>
  <text x="842" y="252" class="text">VERIFY</text>
  <text x="842" y="274" class="small">run checks</text>
  <rect x="1030" y="210" width="190" height="82" rx="9" class="panel"/>
  <text x="1058" y="252" class="text">DOCUMENT</text>
  <text x="1058" y="274" class="small">make legible</text>
  <rect x="1030" y="366" width="190" height="82" rx="9" class="panel"/>
  <text x="1058" y="408" class="text">PATCH</text>
  <text x="1058" y="430" class="small">reduce risk</text>
  <path d="M276 251H322M492 251H548M758 251H814M984 251H1030" class="route"/>
  <path d="M1125 292V366" class="route"/>
  <path d="M1030 407H760Q724 407 724 371V310" class="review"/>
  <path d="M1030 407H178Q138 407 138 367V292" class="review"/>
  <g transform="translate(618 344)">
    <circle cx="82" cy="74" r="78" fill="#0D171A" stroke="#2A383A"/>
    <circle cx="82" cy="74" r="56" class="olive" opacity="0.72"/>
    <circle cx="82" cy="74" r="34" fill="none" stroke="#B9832F" stroke-width="1.5"/>
    <circle cx="82" cy="74" r="6" class="amber"/>
    <text x="28" y="70" class="text">EVIDENCE</text>
    <text x="18" y="98" class="small">validates every route</text>
  </g>
  <path d="M700 344V292M642 394L492 292M758 394L814 292M778 416H1030M626 416H276" class="line"/>
  <circle cx="700" cy="344" r="6" class="node"/>
  <circle cx="642" cy="394" r="5" class="node"/>
  <circle cx="758" cy="394" r="5" class="node"/>
  <circle cx="778" cy="416" r="5" class="node"/>
  <circle cx="626" cy="416" r="5" class="node"/>
  <path d="M84 120h96v-28M84 120v56M1316 120h-96v-28M1316 120v56M84 492h96v28M84 492v-56M1316 492h-96v28M1316 492v-56" class="line"/>
  <text x="54" y="512" class="micro">DASHED ROUTES ARE REVIEW LOOPS</text>
  <text x="1084" y="512" class="micro">NO FAKE METRICS / NO WIDGETS</text>
</svg>
