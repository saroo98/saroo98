<svg xmlns="http://www.w3.org/2000/svg" width="540" height="250" viewBox="0 0 540 250" role="img" aria-labelledby="title desc">
  <title id="title">local-dictation</title>
  <desc id="desc">Offline Windows dictation bubble with faster-whisper and privacy-first voice typing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#a3e635" stop-opacity="0"/><stop offset="48%" stop-color="#a3e635"/><stop offset="100%" stop-color="#a3e635" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse"><path d="M26 0H0V26" stroke="#a3e635" stroke-opacity=".045" fill="none"/></pattern>
    <style>.sans{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.dash{stroke-dasharray:10 14;animation:dash 12s linear infinite}.dot{animation:dot 2.8s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-380}}@keyframes dot{0%,100%{opacity:.35}50%{opacity:1}}</style>
