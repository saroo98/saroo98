  <text x="32" y="48" class="mono" fill="#a3e635" font-size="13" letter-spacing="2.2">LOCAL TOOL</text>
  <text x="32" y="96" class="sans" fill="#f8fafc" font-size="28" font-weight="800">local-dictation</text>
  <text x="32" y="132" class="mono" fill="#cbd5e1" font-size="15">Offline Windows dictation bubble with</text>
  <text x="32" y="156" class="mono" fill="#cbd5e1" font-size="15">faster-whisper and privacy-first voice typing.</text>
