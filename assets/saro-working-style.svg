<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="290" viewBox="0 0 1120 290" role="img" aria-labelledby="title desc">
  <title id="title">Working style</title>
  <desc id="desc">Small changes, clear boundaries, repeatable checks, and evidence before claims.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#111827"/><stop offset="100%" stop-color="#020617"/></linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#7dd3fc" opacity=".12"/></pattern>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#a3e635" stop-opacity="0"/><stop offset=".5" stop-color="#7dd3fc"/><stop offset="1" stop-color="#f97316" stop-opacity="0"/></linearGradient>
    <style>.sans{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.dash{stroke-dasharray:12 16;animation:dash 15s linear infinite}.pulse{animation:pulse 3.2s ease-in-out infinite}@keyframes dash{to{stroke-dashoffset:-520}}@keyframes pulse{0%,100%{opacity:.38}50%{opacity:1}}</style>
  </defs>
  <rect width="1120" height="290" rx="28" fill="url(#bg)"/>
  <rect width="1120" height="290" rx="28" fill="url(#grid)"/>
  <rect x="1" y="1" width="1118" height="288" rx="27" fill="none" stroke="#c4b5fd" stroke-opacity=".20"/>
  <text x="62" y="70" class="sans" fill="#f8fafc" font-size="32" font-weight="820">Working style</text>
  <text x="62" y="100" class="mono" fill="#94a3b8" font-size="16">small changes · clear boundaries · repeatable checks</text>
  <text x="62" y="154" class="mono" fill="#d8e1ea" font-size="19">Evidence before claims. Tests before confidence.</text>
  <text x="62" y="190" class="mono" fill="#d8e1ea" font-size="19">Readable implementation. Clean handoff. Less noise.</text>
  <text x="62" y="226" class="mono" fill="#d8e1ea" font-size="19">The fastest path is usually a focused GitHub conversation on the relevant repository.</text>
  <path class="dash" d="M690 82H840C890 82 878 132 928 132H1050M690 210H840C890 210 878 162 928 162H1050" stroke="url(#route)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <g class="pulse" transform="translate(870 108)">
    <rect x="0" y="0" width="128" height="76" rx="20" fill="#020617" stroke="#7dd3fc" stroke-opacity=".34"/>
    <path d="M28 38h18l8-22 16 48 9-26h22" stroke="#a3e635" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
