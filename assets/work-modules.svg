<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="300" viewBox="0 0 1400 300" role="img" aria-labelledby="title desc">
  <title id="title">Signal Console OS selected work modules</title>
  <desc id="desc">Four equal dark modules for selected public work: iran-network-field-guide, local-dictation, maintainer-notes, and Sertraline.</desc>
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="1" fill="#2A383A" opacity="0.66"/>
    </pattern>
    <style>
      .bg{fill:#071012}
      .panel{fill:#0D171A;stroke:#2A383A;stroke-width:1.4}
      .text{font:750 19px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:.8px;fill:#E8E1D2}
      .small{font:650 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;letter-spacing:1.4px;fill:#8D9894}
      .route{fill:none;stroke:#B9832F;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
      .olive{fill:#91A35F}
      .amber{fill:#B9832F}
    </style>
  </defs>
  <rect width="1400" height="300" rx="18" class="bg"/>
  <rect width="1400" height="300" rx="18" fill="url(#dots)" opacity="0.48"/>
  <rect x="26" y="26" width="1348" height="248" rx="14" fill="none" stroke="#2A383A"/>
  <text x="54" y="64" class="small">SELECTED WORK / REAL LINKS IN MARKDOWN</text>
  <g transform="translate(54 92)">
    <rect x="0" y="0" width="300" height="142" rx="10" class="panel"/>
    <path d="M22 28h74l18 18h48" class="route"/>
    <circle cx="114" cy="46" r="5" class="olive"/>
    <text x="22" y="80" class="text">iran-network</text>
    <text x="22" y="106" class="text">field-guide</text>
    <text x="22" y="128" class="small">FIELD RESEARCH</text>
  </g>
  <g transform="translate(386 92)">
    <rect x="0" y="0" width="300" height="142" rx="10" class="panel"/>
    <path d="M22 28h58l20 18h72" class="route"/>
    <circle cx="100" cy="46" r="5" class="olive"/>
    <text x="22" y="80" class="text">local-dictation</text>
    <text x="22" y="106" class="small">OFFLINE TOOLING</text>
    <text x="22" y="128" class="small">PRIVACY-FIRST</text>
  </g>
  <g transform="translate(718 92)">
    <rect x="0" y="0" width="300" height="142" rx="10" class="panel"/>
    <path d="M22 28h70l18 18h58" class="route"/>
    <circle cx="110" cy="46" r="5" class="olive"/>
    <text x="22" y="80" class="text">maintainer-notes</text>
    <text x="22" y="106" class="small">GITHUB ACTION</text>
    <text x="22" y="128" class="small">REVIEW NOTES</text>
  </g>
  <g transform="translate(1050 92)">
    <rect x="0" y="0" width="300" height="142" rx="10" class="panel"/>
    <path d="M22 28h68l20 18h76" class="route"/>
    <circle cx="110" cy="46" r="5" class="olive"/>
    <text x="22" y="80" class="text">Sertraline</text>
    <text x="22" y="106" class="small">PUBLISHING SPACE</text>
    <text x="22" y="128" class="small">WRITING / TECHNICAL WORK</text>
  </g>
  <circle cx="354" cy="163" r="5" class="amber"/>
  <circle cx="686" cy="163" r="5" class="amber"/>
  <circle cx="1018" cy="163" r="5" class="amber"/>
</svg>
