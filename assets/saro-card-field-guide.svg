  <text x="32" y="96" class="sans" fill="#f8fafc" font-size="26" font-weight="800">iran-network-field-guide</text>
  <text x="32" y="132" class="mono" fill="#cbd5e1" font-size="15">Field guide for VPN connectivity testing</text>
  <text x="32" y="156" class="mono" fill="#cbd5e1" font-size="15">and censorship-resilience research.</text>
