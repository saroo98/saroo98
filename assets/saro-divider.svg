<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="78" viewBox="0 0 1120 78" role="img" aria-labelledby="title desc">
  <title id="title">Signal divider</title>
  <desc id="desc">Decorative dark signal route divider.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#020617" stop-opacity="0"/>
      <stop offset=".16" stop-color="#020617"/>
      <stop offset=".84" stop-color="#020617"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7dd3fc" stop-opacity="0"/>
      <stop offset=".34" stop-color="#7dd3fc"/>
      <stop offset=".62" stop-color="#f97316"/>
      <stop offset="1" stop-color="#a3e635" stop-opacity="0"/>
    </linearGradient>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#7dd3fc" opacity=".12"/>
    </pattern>
    <style>
      .line{stroke-dasharray:14 16;animation:move 13s linear infinite}
      .node{animation:pulse 3.4s ease-in-out infinite;transform-origin:center}
      @keyframes move{to{stroke-dashoffset:-420}}
      @keyframes pulse{0%,100%{opacity:.42}50%{opacity:1}}
    </style>
  </defs>
  <rect width="1120" height="78" rx="20" fill="url(#bg)"/>
  <rect x="28" y="13" width="1064" height="52" rx="16" fill="url(#dots)" opacity=".86"/>
  <path d="M44 39h224l30-14h156l30 14h152l30 14h156l30-14h224" stroke="#334155" stroke-width="1.3" fill="none"/>
  <path class="line" d="M44 39h224l30-14h156l30 14h152l30 14h156l30-14h224" stroke="url(#route)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle class="node" cx="298" cy="25" r="4" fill="#f97316"/>
  <circle class="node" cx="666" cy="53" r="4" fill="#7dd3fc"/>
  <circle class="node" cx="852" cy="39" r="4" fill="#a3e635"/>
  <circle cx="560" cy="39" r="16" fill="none" stroke="#7dd3fc" stroke-opacity=".25"/>
  <circle cx="560" cy="39" r="6" fill="#020617" stroke="#c4b5fd" stroke-opacity=".7"/>
</svg>
